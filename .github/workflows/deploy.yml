name: Deploy CDK + EC2 Services

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Repo auschecken
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Node.js Setup
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 3. Backend Dependencies (CDK Project)
      # =========================
      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      # =========================
      # 4. CDK installieren
      # =========================
      - name: Install CDK
        run: npm install -g aws-cdk

      # =========================
      # 5. AWS Credentials
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # 6. CDK Bootstrap
      # =========================
      - name: CDK Bootstrap
        run: cd backend && cdk bootstrap || true

      # =========================
      # 7. CDK Deploy (Infrastructure)
      # =========================
      - name: Deploy CDK Stack
        run: cd backend && cdk deploy --require-approval never

      # =========================
      # 8. Trigger EC2 Update via SSM
      # =========================
      - name: Deploy Docker Services on EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy docker stack update" \
            --parameters 'commands=[
              "echo ===== DEPLOY START =====",
              "cd /home/ec2-user/app || cd /home/ec2-user",
              "echo Pull latest docker images...",
              "docker compose down || true",
              "docker compose pull || true",
              "docker compose up -d || docker-compose up -d",
              "echo ===== DEPLOY DONE ====="
            ]'
