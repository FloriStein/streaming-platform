name: Deploy Streaming Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # AWS Login
      # =========================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # Upload docker files to S3
      # =========================
      - name: Upload docker config
        run: |
          aws s3 sync backend/docker s3://${{ secrets.S3_BUCKET_NAME }}/docker

      # =========================
      # Deploy via SSM
      # =========================
      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters 'commands=[
              "set -euxo pipefail",

              "echo === SYSTEM INFO ===",
              "whoami",
              "pwd",

              "echo === CHECK S3 ===",
              "aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}/docker || true",

              "echo === SYNC S3 TO EC2 ===",
              "aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/docker /home/ec2-user/app || true",

              "echo === VERIFY FILES ===",
              "ls -lah /home/ec2-user/app || true",
              "test -f /home/ec2-user/app/docker-compose.yml || echo MISSING COMPOSE FILE",

              "cd /home/ec2-user/app",

              "echo === DOCKER VERSION ===",
              "docker version || true",
              "docker compose version || docker-compose version || echo NO COMPOSE FOUND",

              "echo === START CONTAINERS ===",
              "docker compose up -d || docker-compose up -d || echo FAILED TO START"
            ]'
