name: Deploy Streaming Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS Login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Upload docker files to S3
      - name: Upload docker config
        run: |
          aws s3 sync backend/docker s3://S3_BUCKET_NAME/docker

      # Deploy via SSM
      - name: Restart containers
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceIds,Values=YOUR_INSTANCE_ID" \
            --parameters 'commands=[
              "aws s3 sync s3://S3_BUCKET_NAME/docker /home/ec2-user/app",
              "cd /home/ec2-user/app",
              "/usr/local/bin/docker-compose up -d"
            ]'
